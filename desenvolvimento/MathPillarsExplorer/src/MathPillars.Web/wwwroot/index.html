<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathPillars Explorer</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    
    <!-- KaTeX para renderizacao matematica -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>

    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
    <script>
        window.renderizarMatematica = () => {
            try {
                if (window.renderMathInElement) {
                    renderMathInElement(document.body, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError: false,
                        ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code", "option", "svg", "canvas"]
                    });
                }
            } catch (e) {
                console.warn("Erro ao renderizar KaTeX:", e);
            }
        };

        window.renderizarGrafico3D = (idElemento, pontos) => {
            try {
                const el = document.getElementById(idElemento);
                if (!el) return;

                const x = pontos.map(p => p.x);
                const y = pontos.map(p => p.y);
                const z = pontos.map(p => p.z);

                const dados = [{
                    x: x,
                    y: y,
                    z: z,
                    type: 'mesh3d',
                    intensity: z,
                    colorscale: 'Viridis',
                    opacity: 0.8
                }];

                const layout = {
                    margin: { l: 0, r: 0, b: 0, t: 0 },
                    scene: {
                        xaxis: { title: 'X', gridcolor: '#444' },
                        yaxis: { title: 'Y', gridcolor: '#444' },
                        zaxis: { title: 'Z', gridcolor: '#444' },
                        bgcolor: 'rgba(0,0,0,0)'
                    },
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)'
                };

                Plotly.newPlot(idElemento, dados, layout, { responsive: true, displayModeBar: false });
            } catch (e) {
                console.error("Erro ao renderizar Plotly:", e);
            }
        };
    </script>
</head>

<body>
    <div id="app">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
            <div style="text-align: center;">
                <h2 style="color: #0066FF;">MathPillars</h2>
                <p>Carregando Laboratorio...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocorreu um erro nao tratado.
        <a href="" class="reload">Recarregar</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
